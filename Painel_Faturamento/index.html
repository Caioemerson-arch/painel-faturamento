<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Faturamento — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f4; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #1c1c1a; }
  .card { background: #fff; border: 0.5px solid #e0dfd8; border-radius: 14px; padding: 2rem 2.25rem; width: 100%; max-width: 380px; }
  .logo { font-size: 15px; font-weight: 600; color: #185FA5; margin-bottom: 1.75rem; display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 32px; height: 32px; background: #E6F1FB; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #6b6b68; margin-bottom: 1.75rem; }
  label { display: block; font-size: 12px; font-weight: 500; color: #6b6b68; margin-bottom: 5px; }
  input { width: 100%; padding: 9px 12px; border: 0.5px solid #d0cfc8; border-radius: 8px; font-size: 14px; margin-bottom: 1rem; outline: none; background: #fff; color: #1c1c1a; transition: border-color 0.15s; }
  input:focus { border-color: #378ADD; box-shadow: 0 0 0 3px rgba(55,138,221,0.12); }
  button { width: 100%; padding: 10px; background: #185FA5; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  button:hover { background: #0C447C; }
  button:disabled { background: #b5d4f4; cursor: not-allowed; }
  .error { font-size: 13px; color: #A32D2D; background: #FCEBEB; border: 0.5px solid #F7C1C1; border-radius: 8px; padding: 10px 12px; margin-bottom: 1rem; display: none; }
  .footer { text-align: center; font-size: 12px; color: #9b9b98; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    </div>
    Painel de Faturamento
  </div>
  <h1>Entrar</h1>
  <p class="sub">Acesse com seu e-mail corporativo.</p>
  <div class="error" id="errMsg"></div>
  <label for="email">E-mail</label>
  <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
  <label for="password">Senha</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  <button id="btnLogin" onclick="login()">Entrar</button>
  <p class="footer">Problemas de acesso? Fale com o administrador.</p>
</div>

<script>
const SUPABASE_URL = 'https://wcefqhivhaejueenburz.supabase.co;
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjZWZxaGl2aGFlanVlZW5idXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOj';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errMsg');
  err.style.display = 'none';
  if (!email || !password) { showErr('Preencha e-mail e senha.'); return; }
  btn.disabled = true; btn.textContent = 'Entrando…';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showErr('E-mail ou senha incorretos.'); btn.disabled = false; btn.textContent = 'Entrar'; return; }
  window.location.href = 'dashboard.html';
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg; el.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = 'dashboard.html';
})();
</script>
</body>
</html>
