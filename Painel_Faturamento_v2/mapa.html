<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo — Mapa do Brasil CENEGED</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;min-height:100vh;background:#1A1A2E;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.topo{text-align:center;margin-bottom:2rem}
.topo h1{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px}
.topo p{font-size:13px;color:rgba(255,255,255,.5)}
.mapa-box{background:#fff;border-radius:14px;padding:2rem;max-width:540px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.4)}
#map-svg{width:100%;height:auto}
.estado{stroke:#fff;stroke-width:0.8;transition:fill .15s}
.ativo{fill:#BE2F3B;cursor:pointer}
.ativo:hover{fill:#9a1f2a}
.inativo{fill:#e8e8e4;cursor:default}
.inativo:hover{fill:#d8d8d4}
.legenda{display:flex;gap:16px;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#555}
.leg-cor{width:14px;height:14px;border-radius:3px}
.dica{text-align:center;margin-top:10px;font-size:12px;color:#888;min-height:20px}
.cards{display:flex;gap:10px;justify-content:center;margin-top:1.25rem;flex-wrap:wrap}
.card-est{padding:10px 20px;border-radius:8px;border:2px solid #BE2F3B;background:#fff5f5;cursor:pointer;text-align:center;transition:.15s;min-width:100px}
.card-est:hover{background:#fee;box-shadow:0 4px 12px rgba(190,47,59,.2)}
.card-est .sigla{font-size:20px;font-weight:700;color:#BE2F3B}
.card-est .nome{font-size:10px;color:#888;margin-top:2px}
</style>
</head>
<body>
<div class="topo">
  <h1>Selecione o Estado</h1>
  <p>Clique no mapa ou nos cartões para acessar o painel</p>
</div>
<div class="mapa-box">
  <svg id="map-svg" viewBox="0 0 500 520"></svg>
  <div class="legenda">
    <div class="leg-item"><div class="leg-cor" style="background:#BE2F3B"></div>Estados ativos</div>
    <div class="leg-item"><div class="leg-cor" style="background:#e8e8e4;border:1px solid #ccc"></div>Demais estados</div>
  </div>
  <p class="dica" id="dica">Passe o mouse sobre os estados para destacar</p>
  <div class="cards">
    <div class="card-est" onclick="selecionar('MA')"><div class="sigla">MA</div><div class="nome">Maranhão</div></div>
    <div class="card-est" onclick="selecionar('PI')"><div class="sigla">PI</div><div class="nome">Piauí</div></div>
    <div class="card-est" onclick="selecionar('RJ')"><div class="sigla">RJ</div><div class="nome">Rio de Janeiro</div></div>
  </div>
</div>

<script>
const ATIVOS={MA:'Maranhão',PI:'Piauí',RJ:'Rio de Janeiro'};
const GEO_URL='https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson';

const svg=d3.select('#map-svg');
const w=500,h=520;

d3.json(GEO_URL).then(geo=>{
  const proj=d3.geoMercator().fitSize([w,h],geo);
  const path=d3.geoPath().projection(proj);

  svg.selectAll('path')
    .data(geo.features)
    .enter()
    .append('path')
    .attr('class',d=>ATIVOS[d.properties.sigla]?'estado ativo':'estado inativo')
    .attr('d',path)
    .on('mouseover',function(e,d){
      const n=ATIVOS[d.properties.sigla];
      document.getElementById('dica').textContent=n?`${n} — clique para acessar`:d.properties.name||d.properties.sigla;
    })
    .on('mouseout',()=>document.getElementById('dica').textContent='Passe o mouse sobre os estados para destacar')
    .on('click',(e,d)=>{if(ATIVOS[d.properties.sigla]) selecionar(d.properties.sigla);});

  // Labels dos estados ativos
  svg.selectAll('text')
    .data(geo.features.filter(d=>ATIVOS[d.properties.sigla]))
    .enter()
    .append('text')
    .attr('x',d=>path.centroid(d)[0])
    .attr('y',d=>path.centroid(d)[1]+4)
    .attr('text-anchor','middle')
    .attr('font-size',10)
    .attr('font-weight','700')
    .attr('fill','white')
    .attr('pointer-events','none')
    .text(d=>d.properties.sigla);
});

function selecionar(est){
  document.getElementById('dica').textContent=`✓ Acessando ${ATIVOS[est]}...`;
}
</script>
</body>
</html>
